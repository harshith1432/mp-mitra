services:
  - type: web
    name: mp-mitra-backend
    runtime: python
    region: singapore   # closest free region to India
    plan: free
    buildCommand: >
      mkdir -p $HOME/.node &&
      curl -fsSL https://nodejs.org/dist/v18.19.0/node-v18.19.0-linux-x64.tar.xz | tar -xJ --strip-components=1 -C $HOME/.node &&
      export PATH=$HOME/.node/bin:$PATH &&
      cd frontend &&
      npm install &&
      npm run build &&
      cd ../backend &&
      pip install --upgrade pip &&
      pip install --extra-index-url https://download.pytorch.org/whl/cpu -r requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false          # set in Render dashboard
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false          # set in Render dashboard
      - key: ALLOWED_ORIGINS
        value: "https://mp-mitra-7e6d9.web.app,https://mp-mitra.web.app"

