name: MP Mitra Enterprise Release Pipeline

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: false
        default: 'patch'
        type: choice
        options: [patch, minor, major]

jobs:
  # ─── Job 1: Test & Build ────────────────────────────────────────────────────
  build:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read Current Version
        id: version
        shell: pwsh
        run: |
          $info = Get-Content version.json | ConvertFrom-Json
          $ver  = $info.version
          $tag  = "v$ver"
          echo "version=$ver" >> $env:GITHUB_OUTPUT
          echo "tag=$tag"     >> $env:GITHUB_OUTPUT
          Write-Host "Building version: $ver (tag: $tag)"

      # ── Frontend ──────────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build React Frontend
        working-directory: frontend
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
        run: |
          npm ci --legacy-peer-deps
          npm run build

      - name: Verify Frontend Build
        shell: pwsh
        run: |
          if (-not (Test-Path "frontend/dist/index.html")) {
            Write-Error "frontend/dist/index.html is missing!"
            exit 1
          }
          if (-not (Test-Path "frontend/dist/assets")) {
            Write-Error "frontend/dist/assets is missing!"
            exit 1
          }
          Write-Host "Frontend build verified successfully."

      # ── Backend ───────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r backend/requirements.txt

      # ── Generate release.json Manifest ────────────────────────────────────
      - name: Generate Release Manifest
        id: manifest
        shell: pwsh
        run: |
          $info = Get-Content version.json | ConvertFrom-Json
          $ver  = $info.version
          $tag  = "v$ver"
          $date = (Get-Date -Format "yyyy-MM-dd")
          $owner = "${{ github.repository_owner }}"
          $repo  = "${{ github.event.repository.name }}"
          $dl    = "https://github.com/$owner/$repo/releases/download/$tag/MPMitraSetup-$ver-windows-x64.zip"

          $manifest = @{
            version      = $ver
            channel      = "stable"
            mandatory    = $false
            notes        = "See release notes on GitHub."
            download_url = $dl
            sha256       = ""
            release_date = $date
          } | ConvertTo-Json -Depth 3

          $manifest | Out-File -FilePath "release.json" -Encoding utf8
          Write-Host "Generated release.json for v$ver"

      # ── PyInstaller Compile ────────────────────────────────────────────────
      - name: Compile Desktop Application
        shell: pwsh
        run: |
          pyinstaller `
            --name=mpmitra `
            --onedir `
            --clean `
            --noconfirm `
            --add-data "frontend/dist;frontend/dist" `
            --add-data "version.json;." `
            --add-data "release.json;." `
            --paths backend `
            --hidden-import app `
            --hidden-import uvicorn `
            --hidden-import fastapi `
            mpmitra.py

      # ── Package & Checksum ─────────────────────────────────────────────────
      - name: Zip Distribution Package
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.version }}"
          $zipName = "MPMitraSetup-$ver-windows-x64.zip"
          Compress-Archive -Path "dist/mpmitra/*" -DestinationPath "dist/$zipName"
          Write-Host "Created: $zipName"

      - name: Compute SHA256 Checksums
        shell: pwsh
        run: |
          $ver     = "${{ steps.version.outputs.version }}"
          $zipFile = "dist/MPMitraSetup-$ver-windows-x64.zip"
          $hash    = (Get-FileHash -Path $zipFile -Algorithm SHA256).Hash.ToLower()

          # Update release.json with actual checksum
          $manifest = Get-Content release.json | ConvertFrom-Json
          $manifest.sha256 = $hash
          $manifest | ConvertTo-Json -Depth 3 | Out-File -FilePath release.json -Encoding utf8

          # Write SHA256SUMS file
          "$hash  MPMitraSetup-$ver-windows-x64.zip" | Out-File -FilePath "dist/SHA256SUMS.txt" -Encoding ascii

          Write-Host "SHA256: $hash"

      # ── Upload Build Artifacts ─────────────────────────────────────────────
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mpmitra-windows-${{ steps.version.outputs.version }}
          path: |
            dist/MPMitraSetup-*.zip
            dist/SHA256SUMS.txt
            release.json
          retention-days: 30

  # ─── Job 2: Publish GitHub Release (tags only) ──────────────────────────────
  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: mpmitra-windows-${{ needs.build.outputs.version }}
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.tag }}
          name: "MP Mitra ${{ needs.build.outputs.tag }}"
          body_path: release.json
          files: |
            dist/MPMitraSetup-*.zip
            dist/SHA256SUMS.txt
            dist/release.json
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
